<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Community</title>
    <style>
        /* Modern Color Palette */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #10b981; /* Emerald Green */
            --primary-hover: #059669;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-focus: #10b98133;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, hsla(161,72%,85%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,80%,1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #fdfdfd;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--input-focus);
            background: #fff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s active, background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .footer {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="header">
        <h1>Create Account</h1>
        <p>Start your free account today.</p>
    </div>

    <form id="signupForm">

        <div class="form-group">
            <label>Full Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter your full name"
                required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                id="email"
                placeholder="you@example.com"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Minimum 6 characters"
                minlength="6"
                required>
        </div>

        <button
            type="submit"
            class="btn"
            id="signupBtn">

            Create Account

        </button>

    </form>

    <div class="divider">
        OR
    </div>

    <div class="footer">
        Already have an account?

        <a href="login.html">
            Login
        </a>

    </div>

</div>

<!-- Firebase script goes here -->
 <script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
updateProfile
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyAXh-QGBAslhXjf3FRwNIYA2hNmCzSCPhU",

authDomain: "login-f5c62.firebaseapp.com",

projectId: "login-f5c62",

storageBucket: "login-f5c62.firebasestorage.app",

messagingSenderId: "618951041850",

appId: "1:618951041850:web:06c744a7d988d86bd9a603",

measurementId: "G-TSDBHNZBTP"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const signupForm = document.getElementById("signupForm");

signupForm.addEventListener("submit", async (e)=>{

console.log("Signup button clicked");

e.preventDefault();

const name =
document.getElementById("name").value.trim();

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;

await updateProfile(user,{
displayName:name
});

await setDoc(doc(db,"users",user.uid),{

uid:user.uid,

name:name,

email:email,

status:"Online",

createdAt:new Date()

});


alert("Account Created Successfully!");

window.location.href = "index.html";

} catch (error) {

    if (error.code === "auth/email-already-in-use") {

        alert("This email is already registered. Please login.");

    } else if (error.code === "auth/weak-password") {

        alert("Password must be at least 6 characters.");

    } else {

        alert(error.message);

    }

}

});

</script>

</body>

</html>
